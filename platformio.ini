; =============================================================================
; HomeNode — Plataforma IoT Domestica Modular
; PlatformIO Project Configuration
;
; Entornos:
;   nodemcu-32s  : Build produccion para ESP32 NodeMCU-32S (default)
;   ota          : Upload OTA via WiFi
;   native       : Tests unitarios nativos en PC (Unity framework)
; =============================================================================

; -----------------------------------------------------------------------------
; Configuracion global del proyecto
; -----------------------------------------------------------------------------
[platformio]
default_envs = nodemcu-32s

; -----------------------------------------------------------------------------
; Configuracion comun compartida entre entornos ESP32
; -----------------------------------------------------------------------------
[env_common_esp32]
platform = espressif32
board = nodemcu-32s
framework = arduino
monitor_speed = 115200
build_flags =
    -I include
    -I include/core
    -I include/modules
    -D SMRT_PLATFORM_HOMENODE
    -D SMRT_MOD_ENV
    -std=c++11
lib_deps =
    wifi
    WebServer
    Preferences
    ArduinoOTA
    Update
    mathieucarbou/ESP Async WebServer@^3.0.6
    bblanchon/ArduinoJson@^7
    adafruit/DHT sensor library@^1.4.6
    adafruit/Adafruit Unified Sensor@^1.1.14
lib_ignore =
    AsyncTCP_RP2040W
    ESPAsyncTCP-esphome

; -----------------------------------------------------------------------------
; Produccion - ESP32 NodeMCU-32S (upload por USB/serial)
; -----------------------------------------------------------------------------
[env:nodemcu-32s]
extends = env_common_esp32
upload_speed = 115200

; -----------------------------------------------------------------------------
; OTA - Upload por WiFi
; -----------------------------------------------------------------------------
[env:ota]
extends = env_common_esp32
upload_protocol = espota
upload_port = 192.168.1.100
upload_flags = --port=3232

; -----------------------------------------------------------------------------
; Tests nativos - Ejecuta en PC sin hardware ESP32
; -----------------------------------------------------------------------------
[env:native]
platform = native
extra_scripts = pre:add_gcc_path.py
build_flags =
    -I include
    -I include/core
    -I include/modules
    -D UNIT_TEST
    -D SMRT_PLATFORM_HOMENODE
build_src_filter =
    -<*>
lib_deps =
lib_ignore =
    ESP Async WebServer
    ESPAsyncTCP
    AsyncTCP
    wifi
    DHT sensor library
    Adafruit Unified Sensor
test_framework = unity
